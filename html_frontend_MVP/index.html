<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LubimyCzytać - Project</title>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1>My Library</h1>
        <div id="auth-controls">
            <button id="login-btn-main">Log In</button>
            <div id="user-info" style="display: none;">
                <span style="margin-right: 15px; font-weight: bold;">User Mode</span>
                <button id="logout-btn" style="background-color: #e74c3c;">Log Out</button>
            </div>
        </div>
    </header>

    <main>
        <section id="add-book-section">
            <h2>Add a New Book</h2>
            <form id="add-book-form">
                <div>
                    <label for="title">Book Title:</label>
                    <input type="text" id="title" name="title" required>
                </div>
                
                <div>
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author" required>
                </div>

                <div>
                    <label for="genre">Genre:</label>
                    <input type="text" id="genre" name="genre">
                </div>

                <div>
                    <label for="rating">Rating (0-10):</label>
                    <input type="number" id="rating" name="rating" min="0" max="10" value="0">
                </div>
                <div>
                    <label for="image">Cover Image URL (optional):</label>
                    <input type="url" id="image" name="image" placeholder="https://example.com/image.jpg">
                </div>
                <button type="submit">Add to List</button>
            </form>
        </section>

        <hr>

        <section id="library-section">
            <h2>Book List</h2>
            <div id="books-list">
                <p>Loading books...</p>
            </div>
        </section>

        <hr>

        <section id="book-details-section" style="display: none;">
            <h2>Book Details</h2>
            <div id="book-details-content">
                </div>
            <button id="close-details">Close Details</button>
        </section>
    </main>
    <div id="auth-modal" style="display: none;">
        <div id="auth-modal-content">
            <span id="close-auth">&times;</span>
            
            <div id="auth-choices">
                <h2>Welcome</h2>
                <button id="show-login" class="auth-btn">Log In</button>
                <button id="show-register" class="auth-btn">Create Account</button>
            </div>

            <form id="login-form" style="display: none;">
                <h2>Log In</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" style="margin-top: 10px;">Log In</button>
                <button type="button" class="back-btn" style="background-color: #95a5a6; margin-top: 10px;">Back</button>
            </form>

            <form id="register-form" style="display: none;">
                <h2>Create Account</h2>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <button type="submit" style="margin-top: 10px;">Create Account</button>
                <button type="button" class="back-btn" style="background-color: #95a5a6; margin-top: 10px;">Back</button>
            </form>
        </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
